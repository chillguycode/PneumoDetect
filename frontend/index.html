<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia Detection</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="assets/Logo-lightMode.png">
        </div>
        <p>Upload a chest X-ray image to classify it as Normal or Pneumonia.</p>
        
        <div class="uploader">
            <input id="imageUpload" type="file" accept="image/jpeg, image/png">
            <label for="imageUpload">Choose an Image</label>
        </div>

        <div class="preview">
        	<img id="imagePreview" src="" alt="Image preview">
        	<p id="previewText">Image preview will appear here</p>
        </div>

        <button id="predictButton" disabled>Predict</button>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

	<div id="pneumoCam" class="hidden">
		<div id="overlayContainer">
			<img id="xrayOverlay" src="" alt="Image preview" >
			<img id="heatmapOverlay" src="" alt="Image preview" class="hidden">
		</div>
		<div id="pneumoCamStrip">
			<span>PneumoCam</span>
			<a id="downloadBtn">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /> </svg>
				<span class="tooltip">Download</span>
			</a>
		</div>
	</div>

	<canvas id="mergeCanvas" width="224" height="224" class="hidden">

	</canvas>

        <div id="results" class="hidden">
            <h2>Results</h2>
            <p><strong>Classification:</strong> <span id="resultClass"></span></p>
            <p><strong>Confidence:</strong> <span id="resultConfidence"></span></p>
        </div>


        <div id="errorModal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modalTitle">Error</h3>
                <p id="modalMessage"></p>
                <button id="modalCloseButton">Close</button>
            </div>
        </div>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>
