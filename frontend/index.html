<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia Detection</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="assets/Logo-lightMode.png">
        </div>
        <p>Upload a chest X-ray image to classify it as Normal or Pneumonia.</p>
        
        <div class="uploader">
            <input id="imageUpload" type="file" accept="image/jpeg, image/png">
            <label for="imageUpload">Choose an Image</label>
        </div>

        <div class="preview">
            <img id="imagePreview" src="" alt="Image preview">
            <p id="previewText">Image preview will appear here</p>
        </div>
        
        <button id="predictButton" disabled>Predict</button>
        
        <div id="results" class="hidden">
            <h2>Results</h2>
            <p><strong>Classification:</strong> <span id="resultClass"></span></p>
            <p><strong>Confidence:</strong> <span id="resultConfidence"></span></p>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

        <div id="errorModal" class="modal hidden">
            <div class="modal-content">
                <h3 id="modalTitle">Error</h3>
                <p id="modalMessage"></p>
                <button id="modalCloseButton">Close</button>
            </div>
        </div>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>
